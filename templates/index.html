<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水军评论识别系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-lg">
                    <div class="card-header bg-primary text-white text-center">
                        <h1 class="h3">水军评论识别</h1>
                    </div>
                    <div class="card-body">
                        <!-- 模型状态 -->
                        <div class="alert {% if model_loaded %}alert-success{% else %}alert-warning{% endif %} mb-4">
                            <strong>模型状态:</strong> {% if model_loaded %}已加载{% else %}未加载，请先训练模型{% endif %}
                        </div>

                        <!-- 分析工具区域 -->
                        <div class="row mb-5">
                            <!-- 单个评论预测 -->
                            <div class="col-md-4 mb-3">
                                <div class="card h-100">
                                    <div class="card-header">
                                        <h5 class="card-title">单个评论分析</h5>
                                    </div>
                                    <div class="card-body">
                                        <form id="predict-form">
                                            <div class="mb-3">
                                                <label for="comment" class="form-label">评论内容</label>
                                                <textarea class="form-control" id="comment" rows="2" placeholder="请输入评论内容..."></textarea>
                                            </div>
                                            <button type="submit" class="btn btn-primary w-100">分析评论</button>
                                        </form>
                                    </div>
                                </div>
                            </div>

                            <!-- 店铺网址分析 -->
                            <div class="col-md-4 mb-3">
                                <div class="card h-100">
                                    <div class="card-header">
                                        <h5 class="card-title">店铺网址分析</h5>
                                    </div>
                                    <div class="card-body">
                                        <form id="url-form">
                                            <div class="mb-3">
                                                <label for="shop-url" class="form-label">大众点评店铺或评论页网址</label>
                                                <input type="url" class="form-control" id="shop-url" placeholder="https://www.dianping.com/...">
                                            </div>
                                            <button type="submit" class="btn btn-primary w-100">分析店铺水军率</button>
                                        </form>
                                    </div>
                                </div>
                            </div>

                            <!-- 批量文件上传 -->
                            <div class="col-md-4 mb-3">
                                <div class="card h-100">
                                    <div class="card-header">
                                        <h5 class="card-title">批量文件分析</h5>
                                    </div>
                                    <div class="card-body">
                                        <form id="upload-form" enctype="multipart/form-data">
                                            <div class="mb-3">
                                                <label for="file" class="form-label">上传CSV文件</label>
                                                <input type="file" class="form-control" id="file" name="file" accept=".csv">
                                            </div>
                                            <button type="submit" class="btn btn-primary w-100">批量分析CSV</button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 分析结果区域 -->
                        <div class="mb-5">
                            <div id="predict-result" class="mb-4"></div>
                            <div id="url-result" class="mb-4"></div>
                            <div id="upload-result" class="mb-4"></div>
                        </div>

                        <!-- 模型训练 -->
                        <div class="mb-5">
                            <h2 class="h4 mb-3">模型训练</h2>
                            <p class="text-muted mb-3">点击下方按钮开始训练模型，训练过程可能需要几分钟时间</p>
                            <button id="train-btn" class="btn btn-success">开始训练模型</button>
                            <div id="train-result" class="mt-3"></div>
                        </div>

                        <!-- 可视化结果 -->
                        <div class="mb-5">
                            <h2 class="h4 mb-3">可视化结果</h2>
                            <div class="text-center mb-3">
                                <button id="load-visualizations" class="btn btn-info">加载可视化结果</button>
                            </div>
                            <div id="visualization-container" class="mt-3"></div>
                        </div>

                        <!-- 系统说明 -->
                        <div class="mt-5 p-4 bg-light rounded">
                            <h2 class="h4 mb-3">系统说明</h2>
                            <ul class="list-unstyled">
                                <li>• 支持分析大众点评、豆瓣等平台的餐饮、演出类评论</li>
                                <li>• 使用TF-IDF特征提取和机器学习算法进行识别</li>
                                <li>• 支持逻辑回归和LightGBM两种算法</li>
                                <li>• 可尝试从公开页面采集评论，遇到验证时支持CSV上传分析</li>
                            </ul>
                        </div>
                    </div>
                    <div class="card-footer text-center text-muted">
                        <p>&copy; 2026 水军评论识别系统</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
